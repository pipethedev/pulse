# Brimble project config for Pulse.
# Two services off one repo: the API (web) and the interval checker (worker).

services:
  - name: pulse-api
    type: web
    build:
      install: npm install
      command: npm run build
    start: npm run start
    port: 8080
    healthcheck:
      path: /health
    env:
      - CORS_ORIGINS
      - DATABASE_URL
      - BRIMBLE_SANDBOX_KEY
      - S3_ENDPOINT
      - S3_REGION
      - S3_BUCKET
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY
      - PUBLIC_ASSET_BASE_URL
      - SANDBOX_TEMPLATE
      - SANDBOX_REGION

  - name: pulse-checker
    type: worker
    build:
      install: npm install
      command: npm run build
    start: node dist/sandbox/worker-entry.js
    env:
      - DATABASE_URL
      - BRIMBLE_SANDBOX_KEY
      - S3_ENDPOINT
      - S3_REGION
      - S3_BUCKET
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY
      - PUBLIC_ASSET_BASE_URL
      - SANDBOX_TEMPLATE
      - SANDBOX_REGION
      - SANDBOX_MODE
      - CHECK_INTERVAL_MINUTES
